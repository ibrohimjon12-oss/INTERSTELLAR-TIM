<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molyar massa kalkulyatori</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #17212b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: #232e3c;
    border-radius: 20px;
    padding: 20px;
  }

  h1 {
    color: #ffffff;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    color: #8a99a8;
    font-size: 13px;
    text-align: center;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    background: #0f1620;
    border: 2px solid #2b3847;
    border-radius: 12px;
    padding: 16px;
    color: #ffffff;
    font-size: 22px;
    text-align: center;
    outline: none;
  }

  input:focus {
    border-color: #3390ec;
  }

  button {
    width: 100%;
    margin-top: 12px;
    background: #3390ec;
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: #ffffff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
  }

  button:active {
    opacity: 0.8;
  }

  .result {
    margin-top: 20px;
    background: #0f1620;
    border-radius: 12px;
    padding: 16px;
    min-height: 24px;
  }

  .result-value {
    color: #4fd1c5;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
  }

  .result-error {
    color: #ff6b6b;
    font-size: 15px;
    text-align: center;
  }

  .breakdown {
    margin-top: 12px;
    font-size: 13px;
    color: #8a99a8;
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #1c2733;
  }

  .breakdown-row:last-child {
    border-bottom: none;
  }

  .examples {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .example-btn {
    width: auto;
    margin-top: 0;
    background: #2b3847;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 400;
    border-radius: 20px;
  }

  .footer {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid #2b3847;
    text-align: center;
  }

  .footer-name {
    color: #8a99a8;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .footer-link {
    display: inline-block;
    color: #3390ec;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
  }

  .footer-link:active {
    opacity: 0.7;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    background: #0f1620;
    border-radius: 12px;
    padding: 4px;
  }

  .tab-btn {
    flex: 1;
    width: auto;
    margin-top: 0;
    background: transparent;
    color: #8a99a8;
    padding: 10px 8px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 9px;
  }

  .tab-btn.active {
    background: #3390ec;
    color: #ffffff;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .table-scroll {
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .ptable {
    display: grid;
    grid-template-columns: repeat(18, 30px);
    grid-auto-rows: 30px;
    gap: 2px;
  }

  .el {
    grid-column: var(--col);
    grid-row: var(--row);
    background: #2b3847;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    cursor: pointer;
    user-select: none;
  }

  .el:active {
    background: #3390ec;
  }

  .el-spacer {
    grid-column: var(--col);
    grid-row: var(--row);
  }

  .el-info {
    margin-top: 14px;
    background: #0f1620;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    min-height: 20px;
  }

  .el-info .name {
    color: #ffffff;
    font-size: 17px;
    font-weight: 700;
  }

  .el-info .meta {
    color: #8a99a8;
    font-size: 13px;
    margin-top: 4px;
  }

  .el-info .hint {
    color: #4fd1c5;
    font-size: 12px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Kimyo yordamchisi</h1>
  <div class="subtitle">Molyar massa va davriy jadval</div>

  <div class="tabs">
    <button class="tab-btn active" id="tabCalcBtn" onclick="showView('calc')">Kalkulyator</button>
    <button class="tab-btn" id="tabTableBtn" onclick="showView('table')">Davriy jadval</button>
  </div>

  <div class="view active" id="viewCalc">
    <input type="text" id="formula" placeholder="masalan: H2O" autocomplete="off">
    <button onclick="calculate()">Hisoblash</button>

    <div class="examples">
      <button class="example-btn" onclick="setExample('H2O')">H2O</button>
      <button class="example-btn" onclick="setExample('CO2')">CO2</button>
      <button class="example-btn" onclick="setExample('Ca(OH)2')">Ca(OH)2</button>
      <button class="example-btn" onclick="setExample('C6H12O6')">C6H12O6</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <div class="view" id="viewTable">
    <div class="table-scroll">
      <div class="ptable" id="ptable"></div>
    </div>
    <div class="el-info" id="elInfo">Elementni bosing</div>
  </div>

  <div class="footer">
    <div class="footer-name">@TIM_N01</div>
    <a class="footer-link" href="https://t.me/Intersteller_NASA" target="_blank">Interstellar NASA kanaliga qo'shiling</a>
  </div>
</div>

<script>
  // Atom massalari (g/mol), asosiy elementlar
  const atomicMasses = {
    H: 1.008, He: 4.0026, Li: 6.94, Be: 9.0122, B: 10.81, C: 12.011,
    N: 14.007, O: 15.999, F: 18.998, Ne: 20.180, Na: 22.990, Mg: 24.305,
    Al: 26.982, Si: 28.085, P: 30.974, S: 32.06, Cl: 35.45, Ar: 39.948,
    K: 39.098, Ca: 40.078, Sc: 44.956, Ti: 47.867, V: 50.942, Cr: 51.996,
    Mn: 54.938, Fe: 55.845, Co: 58.933, Ni: 58.693, Cu: 63.546, Zn: 65.38,
    Ga: 69.723, Ge: 72.630, As: 74.922, Se: 78.971, Br: 79.904, Kr: 83.798,
    Rb: 85.468, Sr: 87.62, Y: 88.906, Zr: 91.224, Nb: 92.906, Mo: 95.95,
    Tc: 98, Ru: 101.07, Rh: 102.91, Pd: 106.42, Ag: 107.87, Cd: 112.41,
    In: 114.82, Sn: 118.71, Sb: 121.76, Te: 127.60, I: 126.90, Xe: 131.29,
    Cs: 132.91, Ba: 137.33, La: 138.91, Ce: 140.12, Pr: 140.91, Nd: 144.24,
    Pm: 145, Sm: 150.36, Eu: 151.96, Gd: 157.25, Tb: 158.93, Dy: 162.50,
    Ho: 164.93, Er: 167.26, Tm: 168.93, Yb: 173.05, Lu: 174.97, Hf: 178.49,
    Ta: 180.95, W: 183.84, Re: 186.21, Os: 190.23, Ir: 192.22, Pt: 195.08,
    Au: 196.97, Hg: 200.59, Tl: 204.38, Pb: 207.2, Bi: 208.98, Po: 209,
    At: 210, Rn: 222, Fr: 223, Ra: 226, Ac: 227, Th: 232.04, Pa: 231.04,
    U: 238.03, Np: 237, Pu: 244, Am: 243, Cm: 247, Bk: 247, Cf: 251,
    Es: 252, Fm: 257, Md: 258, No: 259, Lr: 262
  };

  function setExample(formula) {
    document.getElementById('formula').value = formula;
    calculate();
  }

  // Elementlar nomi (o'zbekcha), atom raqami va jadvaldagi joyi (ustun, qator)
  const elements = [
    [1,'H','Vodorod',1,1],[2,'He','Geliy',18,1],
    [3,'Li','Litiy',1,2],[4,'Be','Berilliy',2,2],[5,'B','Bor',13,2],[6,'C','Uglerod',14,2],
    [7,'N','Azot',15,2],[8,'O','Kislorod',16,2],[9,'F','Ftor',17,2],[10,'Ne','Neon',18,2],
    [11,'Na','Natriy',1,3],[12,'Mg','Magniy',2,3],[13,'Al','Alyuminiy',13,3],[14,'Si','Kremniy',14,3],
    [15,'P','Fosfor',15,3],[16,'S','Oltingugurt',16,3],[17,'Cl','Xlor',17,3],[18,'Ar','Argon',18,3],
    [19,'K','Kaliy',1,4],[20,'Ca','Kalsiy',2,4],[21,'Sc','Skandiy',3,4],[22,'Ti','Titan',4,4],
    [23,'V','Vanadiy',5,4],[24,'Cr','Xrom',6,4],[25,'Mn','Marganes',7,4],[26,'Fe','Temir',8,4],
    [27,'Co','Kobalt',9,4],[28,'Ni','Nikel',10,4],[29,'Cu','Mis',11,4],[30,'Zn','Rux',12,4],
    [31,'Ga','Galliy',13,4],[32,'Ge','Germaniy',14,4],[33,'As','Mishyak',15,4],[34,'Se','Selen',16,4],
    [35,'Br','Brom',17,4],[36,'Kr','Kripton',18,4],
    [37,'Rb','Rubidiy',1,5],[38,'Sr','Stronsiy',2,5],[39,'Y','Ittriy',3,5],[40,'Zr','Sirkoniy',4,5],
    [41,'Nb','Niobiy',5,5],[42,'Mo','Molibden',6,5],[43,'Tc','Texnetsiy',7,5],[44,'Ru','Ruteniy',8,5],
    [45,'Rh','Rodiy',9,5],[46,'Pd','Palladiy',10,5],[47,'Ag','Kumush',11,5],[48,'Cd','Kadmiy',12,5],
    [49,'In','Indiy',13,5],[50,'Sn','Qalay',14,5],[51,'Sb','Surma',15,5],[52,'Te','Tellur',16,5],
    [53,'I','Yod',17,5],[54,'Xe','Ksenon',18,5],
    [55,'Cs','Sezyi',1,6],[56,'Ba','Bariy',2,6],
    [72,'Hf','Gafniy',4,6],[73,'Ta','Tantal',5,6],[74,'W','Volfram',6,6],[75,'Re','Reniy',7,6],
    [76,'Os','Osmiy',8,6],[77,'Ir','Iridiy',9,6],[78,'Pt','Platina',10,6],[79,'Au','Oltin',11,6],
    [80,'Hg','Simob',12,6],[81,'Tl','Talliy',13,6],[82,'Pb',"Qo'rg'oshin",14,6],[83,'Bi','Vismut',15,6],
    [84,'Po','Poloniy',16,6],[85,'At','Astat',17,6],[86,'Rn','Radon',18,6],
    [87,'Fr','Fransiy',1,7],[88,'Ra','Radiy',2,7],
    [104,'Rf','Rezerfordiy',4,7],[105,'Db','Dubniy',5,7],[106,'Sg','Seaborgiy',6,7],[107,'Bh','Boriy',7,7],
    [108,'Hs','Xassiy',8,7],[109,'Mt','Meytneriy',9,7],[110,'Ds','Darmshtatiy',10,7],[111,'Rg','Rentgeniy',11,7],
    [112,'Cn','Kopernitsiy',12,7],[113,'Nh','Nixoniy',13,7],[114,'Fl','Fleroviy',14,7],[115,'Mc','Moskoviy',15,7],
    [116,'Lv','Livermoriy',16,7],[117,'Ts','Tennessin',17,7],[118,'Og','Oganesson',18,7],
    // Lantanoidlar (8-qator sifatida ko'rsatiladi)
    [57,'La','Lantan',3,8.5],[58,'Ce','Seriy',4,8.5],[59,'Pr','Prazeodim',5,8.5],[60,'Nd','Neodim',6,8.5],
    [61,'Pm','Prometiy',7,8.5],[62,'Sm','Samariy',8,8.5],[63,'Eu','Yevropiy',9,8.5],[64,'Gd','Gadoliniy',10,8.5],
    [65,'Tb','Terbiy',11,8.5],[66,'Dy','Disproziy',12,8.5],[67,'Ho','Golmiy',13,8.5],[68,'Er','Erbiy',14,8.5],
    [69,'Tm','Tuliy',15,8.5],[70,'Yb','Itterbiy',16,8.5],[71,'Lu','Lyutetsiy',17,8.5],
    // Aktinoidlar (9-qator sifatida ko'rsatiladi)
    [89,'Ac','Aktiniy',3,9.5],[90,'Th','Toriy',4,9.5],[91,'Pa','Protaktiniy',5,9.5],[92,'U','Uran',6,9.5],
    [93,'Np','Neptuniy',7,9.5],[94,'Pu','Plutoniy',8,9.5],[95,'Am','Amerikiy',9,9.5],[96,'Cm','Kyuriy',10,9.5],
    [97,'Bk','Berkeliy',11,9.5],[98,'Cf','Kaliforniy',12,9.5],[99,'Es','Eynshteyniy',13,9.5],[100,'Fm','Fermiy',14,9.5],
    [101,'Md','Mendeleviy',15,9.5],[102,'No','Nobeliy',16,9.5],[103,'Lr','Lourensiy',17,9.5]
  ];

  function renderTable() {
    const ptable = document.getElementById('ptable');
    let html = '';
    // 8 va 9-qatorlar orasida bo'sh joy qoldirish uchun 7.5-qatorga spacer
    const rowMap = { 8.5: 9, 9.5: 10 }; // f-blok qatorlarini asosiy jadvaldan pastroqqa surish (7-qatordan keyin bo'sh qator)

    elements.forEach(([num, symbol, name, col, row]) => {
      const displayRow = rowMap[row] || row;
      html += `<div class="el" style="--col:${col};--row:${displayRow}" onclick="showElement('${symbol}','${name}',${num})">${symbol}</div>`;
    });

    ptable.innerHTML = html;
  }

  function showElement(symbol, name, num) {
    const mass = atomicMasses[symbol];
    document.getElementById('elInfo').innerHTML =
      `<div class="name">${name} (${symbol})</div>` +
      `<div class="meta">Atom raqami: ${num} · Massa: ${mass} g/mol</div>` +
      `<div class="hint">Formulaga qo'shish uchun bosing ↓</div>` +
      `<button style="margin-top:10px" onclick="addToFormula('${symbol}')">${symbol} ni formulaga qo'shish</button>`;
  }

  function addToFormula(symbol) {
    const input = document.getElementById('formula');
    input.value += symbol;
    showView('calc');
    calculate();
  }

  function showView(view) {
    document.getElementById('viewCalc').classList.toggle('active', view === 'calc');
    document.getElementById('viewTable').classList.toggle('active', view === 'table');
    document.getElementById('tabCalcBtn').classList.toggle('active', view === 'calc');
    document.getElementById('tabTableBtn').classList.toggle('active', view === 'table');
  }

  renderTable();


  // Formulani parslab, {element: count} ob'ektiga aylantiradi.
  // Qavslarni ham qo'llab-quvvatlaydi, masalan Ca(OH)2
  function parseFormula(formula) {
    let i = 0;

    function parseGroup() {
      const counts = {};

      while (i < formula.length && formula[i] !== ')') {
        if (formula[i] === '(') {
          i++; // '(' ni o'tkazib yuborish
          const groupCounts = parseGroup();
          i++; // ')' ni o'tkazib yuborish

          let multiplier = '';
          while (i < formula.length && /[0-9]/.test(formula[i])) {
            multiplier += formula[i];
            i++;
          }
          multiplier = multiplier === '' ? 1 : parseInt(multiplier, 10);

          for (const el in groupCounts) {
            counts[el] = (counts[el] || 0) + groupCounts[el] * multiplier;
          }
        } else if (/[A-Z]/.test(formula[i])) {
          let symbol = formula[i];
          i++;
          if (i < formula.length && /[a-z]/.test(formula[i])) {
            symbol += formula[i];
            i++;
          }

          let count = '';
          while (i < formula.length && /[0-9]/.test(formula[i])) {
            count += formula[i];
            i++;
          }
          count = count === '' ? 1 : parseInt(count, 10);

          if (!(symbol in atomicMasses)) {
            throw new Error("Noma'lum element: " + symbol);
          }

          counts[symbol] = (counts[symbol] || 0) + count;
        } else {
          throw new Error("Formulada xato belgi: '" + formula[i] + "'");
        }
      }

      return counts;
    }

    const result = parseGroup();
    if (i < formula.length) {
      throw new Error('Qavslar mos kelmadi');
    }
    return result;
  }

  function calculate() {
    const input = document.getElementById('formula').value.trim();
    const resultDiv = document.getElementById('result');

    if (input === '') {
      resultDiv.innerHTML = '';
      return;
    }

    try {
      const counts = parseFormula(input);
      let total = 0;
      let breakdownHtml = '<div class="breakdown">';

      for (const el in counts) {
        const mass = atomicMasses[el] * counts[el];
        total += mass;
        breakdownHtml += `<div class="breakdown-row"><span>${el} × ${counts[el]}</span><span>${mass.toFixed(3)}</span></div>`;
      }
      breakdownHtml += '</div>';

      resultDiv.innerHTML =
        `<div class="result-value">${total.toFixed(3)} g/mol</div>` +
        breakdownHtml;
    } catch (e) {
      resultDiv.innerHTML = `<div class="result-error">${e.message}</div>`;
    }
  }

  document.getElementById('formula').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') calculate();
  });

  // Telegram Mini App bilan integratsiya
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
</script>

</body>
</html>
